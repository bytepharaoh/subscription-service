<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Архитектура subscription-service</title>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
  .th  { font-size: 13px; font-weight: 600; }
  .ts  { font-size: 11px; fill: #555; }
  .arr { stroke: #888; stroke-width: 1.5; fill: none; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Client -->
<rect x="240" y="16" width="200" height="44" rx="8" fill="#F0EDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">HTTP Client</text>
<text class="ts"  x="340" y="51" text-anchor="middle" dominant-baseline="central">curl · Swagger UI</text>

<line x1="340" y1="60" x2="340" y2="88" class="arr" marker-end="url(#a)" marker-start="url(#a)"/>

<!-- Middleware -->
<rect x="40" y="90" width="600" height="56" rx="8" fill="#EEDEDF" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="111" text-anchor="middle" dominant-baseline="central">Middleware chain</text>
<text class="ts"  x="340" y="129" text-anchor="middle" dominant-baseline="central">Recovery · RequestID · Logger · CORS · Timeout</text>

<line x1="340" y1="146" x2="340" y2="174" class="arr" marker-end="url(#a)"/>

<!-- Handlers -->
<rect x="40"  y="176" width="178" height="56" rx="8" fill="#DCF5ED" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="129" y="197" text-anchor="middle" dominant-baseline="central">CRUDL handlers</text>
<text class="ts"  x="129" y="215" text-anchor="middle" dominant-baseline="central">POST · GET · PUT · DELETE</text>

<rect x="233" y="176" width="214" height="56" rx="8" fill="#DCF5ED" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="197" text-anchor="middle" dominant-baseline="central">Aggregation handler</text>
<text class="ts"  x="340" y="215" text-anchor="middle" dominant-baseline="central">GET /subscriptions/total-cost</text>

<rect x="462" y="176" width="178" height="56" rx="8" fill="#E8E8E4" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="551" y="197" text-anchor="middle" dominant-baseline="central">System handlers</text>
<text class="ts"  x="551" y="215" text-anchor="middle" dominant-baseline="central">GET /health · /swagger</text>

<line x1="129" y1="232" x2="240" y2="292" class="arr" marker-end="url(#a)"/>
<line x1="340" y1="232" x2="340" y2="292" class="arr" marker-end="url(#a)"/>
<line x1="551" y1="232" x2="440" y2="292" class="arr" marker-end="url(#a)"/>

<!-- Service -->
<rect x="40" y="294" width="600" height="56" rx="8" fill="#FAE8E4" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="315" text-anchor="middle" dominant-baseline="central">Service layer</text>
<text class="ts"  x="340" y="333" text-anchor="middle" dominant-baseline="central">Бизнес-логика · валидация дат · маппинг ошибок</text>

<line x1="340" y1="350" x2="340" y2="378" class="arr" marker-end="url(#a)"/>

<!-- Repository -->
<rect x="40" y="380" width="600" height="56" rx="8" fill="#FAF0DC" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="401" text-anchor="middle" dominant-baseline="central">Repository (interface + postgres implementation)</text>
<text class="ts"  x="340" y="419" text-anchor="middle" dominant-baseline="central">Create · GetByID · Update · Delete · List · GetTotalCost</text>

<line x1="200" y1="436" x2="180" y2="466" class="arr" marker-end="url(#a)"/>
<line x1="480" y1="436" x2="500" y2="466" class="arr" marker-end="url(#a)"/>

<!-- sqlc + migrate -->
<rect x="40"  y="468" width="280" height="56" rx="8" fill="#E8E8E4" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="180" y="489" text-anchor="middle" dominant-baseline="central">sqlc generated queries</text>
<text class="ts"  x="180" y="507" text-anchor="middle" dominant-baseline="central">Type-safe SQL · pgx/v5</text>

<rect x="360" y="468" width="280" height="56" rx="8" fill="#E8E8E4" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="500" y="489" text-anchor="middle" dominant-baseline="central">golang-migrate</text>
<text class="ts"  x="500" y="507" text-anchor="middle" dominant-baseline="central">SQL migrations · schema versioning</text>

<line x1="180" y1="524" x2="290" y2="548" class="arr" marker-end="url(#a)"/>
<line x1="500" y1="524" x2="390" y2="548" class="arr" marker-end="url(#a)"/>

<!-- Postgres -->
<rect x="160" y="538" width="360" height="32" rx="8" fill="#D8E9F8" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="555" text-anchor="middle" dominant-baseline="central">PostgreSQL 16</text>
</svg>
